    <!-- Windows row 1 -->
    <rect x="186" y="156" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="236" y="156" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="286" y="156" width="40" height="40" rx="4" fill="#2563eb"/>
    <!-- Windows row 2 -->
    <rect x="186" y="216" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="236" y="216" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="286" y="216" width="40" height="40" rx="4" fill="#2563eb"/>
    <!-- Windows row 3 -->
    <rect x="186" y="276" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="236" y="276" width="40" height="40" rx="4" fill="#2563eb"/>
    <rect x="286" y="276" width="40" height="40" rx="4" fill="#2563eb"/>
    <!-- Roof -->
